name: php
version: "8.3"
type: binary_injection
base_hierarchy:
  - static
  - base
  - cc

dependencies:
  - name: zlib
    version: "1.3.1"
    type: source
  - name: openssl
    version: "3.4.0"
    type: source
  - name: libxml2
    version: "2.12.9"
    type: source
  - name: sqlite
    version: "3.47.0"
    type: source
  - name: oniguruma
    version: "6.9.9"
    type: source
  - name: curl
    version: "8.11.0"
    type: source
  - name: libxcrypt
    version: "4.4.36"
    type: source
  - name: pcre2
    version: "10.44"
    type: source

runtime:
  name: php
  version: "8.3.13"
  binary_url: "DNF"
  build_flags:
    - --with-openssl=/opt/distroless
    - --with-zlib=/opt/distroless
    - --with-curl=/opt/distroless
    - --with-libxml=/opt/distroless
    - --with-sqlite3=/opt/distroless
    - --with-pdo-sqlite=/opt/distroless
    - --with-onig=/opt/distroless
    - --with-pcre-dir=/opt/distroless
    - --enable-fpm
    - --enable-mbstring
    - --enable-bcmath
    - --enable-xml
    - --enable-pcntl
    - --with-config-file-path=/etc/php
    - --with-config-file-scan-dir=/etc/php/conf.d
