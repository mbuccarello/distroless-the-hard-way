name: perl
version: "5.38"
type: binary_injection
base_hierarchy:
  - static
  - base
  - cc

dependencies:
  - name: zlib
    version: "1.3.1"
    type: source
  - name: gdbm
    version: "1.24"
    type: source
  - name: bzip2
    version: "1.0.8"
    type: source

runtime:
  name: perl
  version: "5.38.2"
  binary_url: "DNF"
  build_flags:
    - "-des"
    - "-Dprefix=/usr"
    - "-Dvendorprefix=/usr"
    - "-Dprivlib=/usr/share/perl5/core_perl"
    - "-Darchlib=/usr/lib/perl5/5.38/core_perl"
    - "-Dvendorlib=/usr/share/perl5/vendor_perl"
    - "-Dvendorarch=/usr/lib/perl5/5.38/vendor_perl"
    - "-Dsitearch=/usr/lib/perl5/5.38/site_perl"
    - "-Dsitelib=/usr/share/perl5/site_perl"
    - "-Duseshrplib"
    - "-Dusethreads"
