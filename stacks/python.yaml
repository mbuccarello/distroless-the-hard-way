name: python
version: "3.14"
type: source_build
base_hierarchy:
  - static
  - base
  - cc

dependencies:
  - name: zlib
    version: "1.3.1"
    type: source
  - name: openssl
    version: "3.4.0"
    type: source
  - name: libxcrypt
    version: "4.4.36"
    type: source
  - name: libffi
    version: "3.4.6"
    type: source
  - name: expat
    version: "2.6.4"
    type: source
  - name: bzip2
    version: "1.0.8"
    type: source
  - name: xz
    version: "5.6.3"
    type: source
  - name: ncurses
    version: "6.5"
    type: source
  - name: readline
    version: "8.2"
    type: source
  - name: sqlite
    version: "3.47.0"
    type: source
  - name: gdbm
    version: "1.24"
    type: source

runtime:
  name: python
  version: "3.14.0"
  source_url: "https://www.python.org/ftp/python/3.14.0/Python-3.14.0a2.tar.xz"
  sha256: "0c7df4a365ac4b90b01627aba81df7d4" # Placeholder SHA
  build_flags:
    - "--enable-optimizations"
    - "--with-lto"
    - "--enable-shared"
    - "--with-system-ffi"
    - "--with-system-expat"
    - "--without-ensurepip"
