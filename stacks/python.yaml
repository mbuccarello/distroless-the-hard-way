name: python
version: "3.14"
description: "Sovereign Python 3.14 Distroless Image (Arch Linux based)"

dependencies:
  - name: zlib
    version: "1.3.1"
    type: source
  - name: openssl
    version: "3.4.0"
    type: source
  - name: libxcrypt
    version: "4.4.36"
    type: source
  - name: libffi
    version: "3.4.6"
    type: source
  - name: expat
    version: "2.6.4"
    type: source
  - name: bzip2
    version: "1.0.8"
    type: source
  - name: xz
    version: "5.6.3"
    type: source
  - name: ncurses
    version: "6.5"
    type: source
  - name: readline
    version: "8.2"
    type: source
  - name: sqlite
    version: "3.47.0"
    type: source

runtime:
  name: python
  version: "3.13"
  type: binary_injection
  binary_url: "https://github.com/indygreg/python-build-standalone/releases/download/20241016/cpython-3.13.0+20241016-x86_64-unknown-linux-gnu-install_only.tar.gz"
