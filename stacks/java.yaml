name: java
version: "21.0.11"
type: binary_injection
base_hierarchy:
  - static
  - base
  - cc

dependencies:
  - name: zlib
    version: "latest"
  - name: freetype2
    version: "latest"
  - name: libpng
    version: "latest"
  - name: lcms2
    version: "latest"
  - name: libjpeg-turbo
    version: "latest"
  - name: libx11
    version: "latest"
  - name: libxext
    version: "latest"
  - name: libxrender
    version: "latest"
  - name: libxtst
    version: "latest"
  - name: alsa-lib
    version: "latest"

runtime:
  name: openjdk
  version: "21.0.11"
  binary_url: "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.6%2B7/OpenJDK21U-jdk_x64_linux_hotspot_21.0.6_7.tar.gz"
  build_flags:
    - "--with-zlib=system"
    - "--with-freetype=system"
    - "--with-libpng=system"
    - "--with-lcms=system"
    - "--with-libjpeg=system"
    - "--disable-warnings-as-errors"
    - "--with-native-debug-symbols=none"
    - "--with-jvm-variants=server"
    - "--with-debug-level=release"
