name: java
version: "21.0.11"
type: source_build
base_hierarchy:
  - static
  - base
  - cc

dependencies:
  - name: zlib
    version: "latest"
  - name: freetype2
    version: "latest"
  - name: libpng
    version: "latest"
  - name: lcms2
    version: "latest"
  - name: libjpeg-turbo
    version: "latest"
  - name: libx11
    version: "latest"
  - name: libxext
    version: "latest"
  - name: libxrender
    version: "latest"
  - name: libxtst
    version: "latest"
  - name: alsa-lib
    version: "latest"

runtime:
  name: openjdk
  version: "21.0.11"
  source_url: "https://github.com/openjdk/jdk21u/archive/refs/tags/jdk-21.0.11-ga.tar.gz"
  sha256: "SKIP"
  build_flags:
    - "--with-zlib=system"
    - "--with-freetype=system"
    - "--with-libpng=system"
    - "--with-lcms=system"
    - "--with-libjpeg=system"
    - "--disable-warnings-as-errors"
    - "--with-native-debug-symbols=none"
    - "--with-jvm-variants=server"
    - "--with-debug-level=release"
