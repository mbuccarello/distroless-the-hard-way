name: Opensource Distroless Assembly - Static

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/assemble-static.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Cosign
        run: |
          curl -O -L "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64"
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign

      - name: Authenticate to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Construct Sovereign Static RootFS
        id: push
        run: |
          cat <<EOF > Dockerfile
          FROM fedora:40 as builder
          RUN mkdir -p /rootfs/etc/ssl/certs /rootfs/etc/pki/tls/certs /rootfs/usr/bin /rootfs/tmp /rootfs/home/nonroot /rootfs/root
          RUN chmod 1777 /rootfs/tmp
          
          # Copy Sovereign Foundations
          COPY --from=ghcr.io/${{ github.repository_owner }}/artifacts-cacerts:latest /cacerts-layer.tar.gz /
          COPY --from=ghcr.io/${{ github.repository_owner }}/artifacts-tzdata:latest /tzdata-layer.tar.gz /
          
          # Extract foundations
          RUN tar -xzf /cacerts-layer.tar.gz -C /rootfs
          RUN tar -xzf /tzdata-layer.tar.gz -C /rootfs
          
          # --- THE HARD WAY: Sovereign Config Files ---
          
          # Identity: root and canonical nonroot (65532)
          RUN echo 'root:x:0:0:root:/root:/bin/sh' > /rootfs/etc/passwd && \
              echo 'nonroot:x:65532:65532:nonroot:/home/nonroot:/sbin/nologin' >> /rootfs/etc/passwd && \
              echo 'root:x:0:' > /rootfs/etc/group && \
              echo 'nonroot:x:65532:' >> /rootfs/etc/group
          
          # Netbase: Minimal Services and Protocols
          RUN echo 'tcp 6/TCP' > /rootfs/etc/protocols && \
              echo 'udp 17/UDP' >> /rootfs/etc/protocols && \
              echo 'icmp 1/ICMP' >> /rootfs/etc/protocols && \
              echo 'http 80/tcp' > /rootfs/etc/services && \
              echo 'https 443/tcp' >> /rootfs/etc/services && \
              echo 'ssh 22/tcp' >> /rootfs/etc/services
          
          # Metadata: Canonical os-release
          RUN echo 'NAME="Opensource Distroless"' > /rootfs/etc/os-release && \
              echo 'ID=opensource-distroless' >> /rootfs/etc/os-release && \
              echo 'PRETTY_NAME="Opensource Distroless (Static)"' >> /rootfs/etc/os-release && \
              echo 'VARIANT="Static"' >> /rootfs/etc/os-release
          
          # SSL Symlinks Compatibility
          RUN ln -sf /etc/ssl/certs/ca-certificates.crt /rootfs/etc/ssl/cert.pem && \
              ln -sf /etc/ssl/certs/ca-certificates.crt /rootfs/etc/pki/tls/certs/ca-bundle.crt && \
              ln -sf /etc/ssl/certs/ca-certificates.crt /rootfs/etc/pki/tls/cert.pem
          
          FROM scratch
          COPY --from=builder /rootfs /
          USER 65532:65532
          ENV PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          ENV SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
          EOF
          
          docker build -t ghcr.io/${{ github.repository_owner }}/static:latest .
          docker push ghcr.io/${{ github.repository_owner }}/static:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/${{ github.repository_owner }}/static:latest" | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "image_name=ghcr.io/${{ github.repository_owner }}/static:latest" >> $GITHUB_OUTPUT

      - name: Generate SBOM (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/static:latest'
          format: 'spdx-json'
          output: 'static-sbom.spdx.json'

      - name: Attach SBOM to Image
        run: |
          cosign attach sbom --sbom static-sbom.spdx.json ghcr.io/${{ github.repository_owner }}/static:latest


      - name: Sign Distroless Static
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/static:latest

      - name: Generate SLSA Build Provenance (Level 3)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/static
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
