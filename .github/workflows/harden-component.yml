name: Opensource Distroless Hardener - Security Patching

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to harden (zlib, glibc, openssl, etc.)'
        required: true
        type: choice
        options:
          - zlib
          - glibc
          - openssl
          - tzdata
      version:
        description: 'Version to patch'
        required: true
        default: 'latest'

jobs:
  harden-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Authenticate to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin


      - name: Install Cosign (Direct Binary)
        run: |
          curl -O -L "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64"
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign
          cosign version

      - name: Load Component Metadata
        id: metadata
        run: |
          # In a real scenario, we would parse the corresponding build-*.yml
          # for version and URL. For this educational process, we assume
          # standardized versions as defined in the project architecture.
          echo "component=${{ github.event.inputs.component }}" >> $GITHUB_OUTPUT

      - name: Fetch and Verify Source
        run: |
          mkdir -p workspace/src workspace/out
          if [ "${{ github.event.inputs.component }}" == "zlib" ]; then
            curl -L https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz -o workspace/src.tar.gz
            echo "17e88863f3600672ab49182f217281b6fc4d3c762bde361935e436a95214d05c  workspace/src.tar.gz" | sha256sum -c -
          elif [ "${{ github.event.inputs.component }}" == "glibc" ]; then
            curl -L https://ftp.gnu.org/gnu/glibc/glibc-2.39.tar.gz -o workspace/src.tar.gz
            echo "b91a780e95c1a7a08e6f1a4e5256e507c390a880949d01cfbc866555c4d612e6  workspace/src.tar.gz" | sha256sum -c -
          fi
          tar -xzf workspace/src.tar.gz -C workspace/src --strip-components=1

      - name: Apply Security Patches
        run: |
          PATCH_DIR="patches/${{ github.event.inputs.component }}"
          if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
            echo "Found patches in $PATCH_DIR, applying..."
            for patch in $PATCH_DIR/*.patch; do
              patch -p1 -d workspace/src < "$patch"
            done
          else
            echo "No patches found for ${{ github.event.inputs.component }}. Proceeding with vanilla source."
          fi

      - name: Hardened SAST Scan (Semgrep)
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: p/security-audit
        # Note: In the Hardener track, this IS blocking by default to verify remediation.

      - name: Compile Hardened Payload (Fedora Glibc-Native Sandbox)
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
        with:
          image: ghcr.io/${{ github.repository_owner }}/base-fedora:latest
          options: -v ${{ github.workspace }}/workspace:/workspace
          run: |
            dnf install -y gcc make bzip2 diffutils
            cd /workspace/src
            ./configure --prefix=/usr
            make -j$(nproc)
            make install DESTDIR=/workspace/out

      - name: Package and Push Hardened OCI Artifact
        run: |
          tar -czf payload-hardened.tar.gz -C workspace/out .
          echo "FROM scratch" > Dockerfile
          echo "ADD payload-hardened.tar.gz /" >> Dockerfile
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/artifacts-${{ github.event.inputs.component }}:latest-hardened"
          docker build -t $IMAGE_NAME .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push $IMAGE_NAME
          
      - name: Sign Hardened Artifact Keyless (Cosign)
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/artifacts-${{ github.event.inputs.component }}:latest-hardened"
          cosign sign --yes $IMAGE_NAME
