name: Opensource Distroless Assembler - java

on:
  workflow_dispatch:
  workflow_call:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Download and Strip Adoptium OpenJDK 21
        run: |
          mkdir -p jvm_payload/raw jvm_payload/stripped
          # Fetch optimized JRE
          curl -L "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.2%2B13/OpenJDK21U-jre_x64_linux_hotspot_21.0.2_13.tar.gz" -o jvm_payload/raw/jdk.tar.gz
          # Strict verification
          echo "f9876e4c278fb1217e6eeba1a566f12ab5a39626e2e00f91a92e1ced0fbb85b8 jvm_payload/raw/jdk.tar.gz" | sha256sum -c -
          
          # Strip components using full GNU tar in the runner
          tar -xzf jvm_payload/raw/jdk.tar.gz -C jvm_payload/stripped --strip-components=1
          # Repack clean tarball for the scratch-based construction stage
          tar -czf jvm_payload/jdk.tar.gz -C jvm_payload/stripped .
          
      - name: Install Cosign (Direct Binary)
        run: |
          curl -O -L "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64"
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign
          cosign version
          
      - name: Verify Underlying CC Ancestry
        run: |
          cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" ghcr.io/${{ github.repository_owner }}/cc:latest
          
      - name: Construct Java Application Runtime
        run: |
          cat <<EOF > Dockerfile
          # Extract safely using the Stage 1 Static Bootstrap (Glibc-native)
          FROM ghcr.io/${{ github.repository_owner }}/bootstrap:latest as extractor
          COPY jvm_payload/jdk.tar.gz /
          # Use our own trusted static tar for extraction (Stripped Payload)
          RUN ["/bin/sh", "-c", "mkdir -p /usr/lib/jvm/java-21-openjdk && /bin/tar -xzf /jdk.tar.gz -C /usr/lib/jvm/java-21-openjdk"]
          
          # Overlay onto strictly verified Opensource Distroless CC
          FROM ghcr.io/${{ github.repository_owner }}/cc:latest
          COPY --from=extractor /usr/lib/jvm /usr/lib/jvm
          
          # Implement standard FHS symlink using our trusted static ln
          COPY --from=extractor /bin/ln /bin/ln
          RUN ["/bin/ln", "-s", "/usr/lib/jvm/java-21-openjdk/bin/java", "/usr/bin/java"]
          RUN ["/bin/ln", "-s", "/usr/lib/jvm/java-21-openjdk/bin/keytool", "/usr/bin/keytool"]
          
          ENV JAVA_HOME=/usr/lib/jvm/java-21-openjdk
          ENV PATH=\$JAVA_HOME/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          
          ENTRYPOINT ["/usr/bin/java", "-version"]
          EOF
          
      - name: Build and Push
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/java:21 .
          docker build -t ghcr.io/${{ github.repository_owner }}/java:latest .
          
      - name: Functional Smoke Test (Verification)
        run: |
          docker run --rm ghcr.io/${{ github.repository_owner }}/java:latest -version
          
      - name: Run Final Image SCA Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/java:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          
      - name: Publish, Sign, and Attest Opensource Distroless Product
        uses: ./.github/actions/assemble-publish-sign
        with:
          image-name: 'java'
          tags: '21 latest'
          github-token: ${{ secrets.GITHUB_TOKEN }}

