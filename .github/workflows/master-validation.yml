name: "Layer 3: Validation (E2E Test Suite)"

# Technical Specification: Validation Layer
# This workflow orchestrates the end-to-end functional assertions.
# Diagram: docs/images/layered-architecture.png

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/master-validation.yml"
      - ".github/workflows/test-*.yml"
  workflow_run:
    workflows: ["Layer 2: Assembly (Image Construction)"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  test-java:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/test-java.yml
    secrets: inherit

  test-python3:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/test-python3.yml
    secrets: inherit

  test-nodejs:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/test-nodejs.yml
    secrets: inherit

  test-php:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/test-php.yml
    secrets: inherit

  test-perl:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/test-perl.yml
    secrets: inherit

  test-dotnet:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/test-dotnet.yml
    secrets: inherit
