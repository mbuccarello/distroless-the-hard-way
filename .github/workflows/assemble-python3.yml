name: Opensource Distroless Assembler - python3

on:
  workflow_dispatch:
  workflow_call:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Download and Strip Official Python 3 Binary
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          mkdir -p payload/raw payload/stripped
          # Fetch official Python 3.12 binary
          curl -L "https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.12.2+20240224-x86_64-unknown-linux-gnu-pgo-full.tar.zst" -o payload/raw/python.tar.zst
          # Strict verification
          echo "4b7e7c7bb0daa771d6e538da1a182cbd02734c21fa3fb4da37d76ac45ae67964 payload/raw/python.tar.zst" | sha256sum -c -
          
          # Extract and Strip components using full GNU tar in the runner
          # Note: indygreg tarballs have a specific 'python' root
          tar -xaf payload/raw/python.tar.zst -C payload/stripped --strip-components=1
          # Repack clean tarball
          tar -czf payload/python.tar.gz -C payload/stripped .
          
      - name: Install Cosign (Direct Binary)
        run: |
          curl -O -L "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64"
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign
          cosign version
          
      - name: Verify CC Ancestry
        run: |
          cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" ghcr.io/${{ github.repository_owner }}/cc:latest
          
      - name: Construct Python 3 Execution Environment
        run: |
          cat <<EOF > Dockerfile
          # Extract safely using the Stage 1 Static Bootstrap (Glibc-native)
          FROM ghcr.io/${{ github.repository_owner }}/bootstrap:latest as extractor
          COPY payload/python.tar.gz /
          # Use our own trusted static tar for extraction (Stripped Payload)
          RUN ["/bin/sh", "-c", "mkdir -p /usr/local/python && /bin/tar -xzf /python.tar.gz -C /usr/local/python"]
          
          # Overlay onto strictly verified Opensource Distroless CC
          FROM ghcr.io/${{ github.repository_owner }}/cc:latest
          COPY --from=extractor /usr/local/python /usr/local/python
          
          # Implement standard FHS symlink using our trusted static ln
          COPY --from=extractor /bin/ln /bin/ln
          RUN ["/bin/ln", "-s", "/usr/local/python/bin/python3", "/usr/bin/python3"]
          RUN ["/bin/ln", "-s", "/usr/local/python/bin/pip3", "/usr/bin/pip3"]
          
          ENV PYTHON_HOME=/usr/local/python
          ENV PATH=\$PYTHON_HOME/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          
          ENTRYPOINT ["/usr/bin/python3"]
          EOF
          
          docker build -t ghcr.io/${{ github.repository_owner }}/python3:3.12 .
          docker build -t ghcr.io/${{ github.repository_owner }}/python3:latest .

      - name: Functional Smoke Test (Verification)
        run: |
          docker run --rm ghcr.io/${{ github.repository_owner }}/python3:latest --version

      - name: Run Final Image SCA Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/python3:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Publish, Sign, and Attest Opensource Distroless Product
        uses: ./.github/actions/assemble-publish-sign
        with:
          image-name: 'python3'
          tags: '3.12 latest'
          github-token: ${{ secrets.GITHUB_TOKEN }}

