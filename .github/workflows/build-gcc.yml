name: Opensource Distroless Build - gcc

on:
  push:
    paths:
      - '.github/workflows/build-gcc.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0
          
      - name: Authenticate to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Fetch and Verify GCC Source (GPG Signature)
        run: |
          mkdir -p workspace/src workspace/out
          cd workspace
          wget https://ftp.gnu.org/gnu/gcc/gcc-13.2.0/gcc-13.2.0.tar.xz
          wget https://ftp.gnu.org/gnu/gcc/gcc-13.2.0/gcc-13.2.0.tar.xz.sig
          
          # Harden GCC Release Manager keys import with retries and multiple servers
          for server in hkps://keyserver.ubuntu.com hkps://keys.openpgp.org hkps://pgp.mit.edu; do
            echo "Attempting to fetch keys from $server..."
            gpg --keyserver "$server" --recv-keys \
              D3A93CAD751C2AF4F8C7AD516C35B999583A0917 \
              B9D0A164669A4D3B && break || echo "Failed to fetch from $server, trying next..."
          done
          
          # Attempt GPG verification
          if gpg --verify gcc-13.2.0.tar.xz.sig gcc-13.2.0.tar.xz; then
            echo "GPG verification successful."
          else
            echo "GPG verification failed! Falling back to hardcoded SHA256 verification as last resort."
            echo "e275e76442a6067341a27f04c5c6b83d8613144004c0413528863dc6b5c743da gcc-13.2.0.tar.xz" | sha256sum -c - || exit 1
          fi
          
          cd ..
          tar -xJf workspace/gcc-13.2.0.tar.xz -C workspace/src --strip-components=1

      - name: SAST Scan via Semgrep
        continue-on-error: true
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: "p/c"

      - name: Compile C++ Runtimes (Fedora Glibc-Native Sandbox)
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
        with:
          image: ghcr.io/${{ github.repository_owner }}/base-fedora:latest
          options: -v ${{ github.workspace }}/workspace:/workspace
          run: |
            dnf install -y gcc gcc-c++ make binutils wget bzip2 gmp-devel libmpc-devel mpfr-devel zlib-devel flex bison diffutils
            mkdir -p /workspace/build
            cd /workspace/build
            export SOURCE_DATE_EPOCH=315532800
            ../src/configure --prefix=/usr \
              --libdir=/usr/lib64 \
              --enable-languages=c,c++ \
              --disable-bootstrap \
              --disable-multilib \
              --disable-nls \
              --with-system-zlib
            # Build and install the target C++ runtime and OpenMP
            make all-target-libstdc++-v3 all-target-libgomp -j$(nproc)
            make install-target-libstdc++-v3 install-target-libgomp DESTDIR=/workspace/out
            
      - name: Package Payload
        run: tar -czf gcc-layer.tar.gz -C workspace/out .
        
      - name: Generate SBOM (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'fs'
          scan-ref: 'workspace/out'
          format: 'spdx-json'
          output: 'gcc-sbom.spdx.json'

      - name: Push to GHCR as OCI Scratch Artifact
        id: push
        run: |
          echo "FROM scratch" > Dockerfile
          echo "COPY gcc-layer.tar.gz /" >> Dockerfile
          docker build -t ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest" | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          
      - name: Sign OCI Artifact Keyless (Cosign)
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest
          cosign attach sbom --sbom gcc-sbom.spdx.json ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest

      - name: Generate SLSA Build Provenance (Level 3)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/artifacts-gcc
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

