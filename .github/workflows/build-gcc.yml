name: Opensource Distroless Build - gcc

on:
  push:
    paths:
      - '.github/workflows/build-gcc.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Cosign
        uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e
        
      - name: Fetch and Verify GCC Source (GPG Signature)
        run: |
          mkdir -p workspace/src workspace/out
          cd workspace
          wget https://ftp.gnu.org/gnu/gcc/gcc-13.2.0/gcc-13.2.0.tar.xz
          wget https://ftp.gnu.org/gnu/gcc/gcc-13.2.0/gcc-13.2.0.tar.xz.sig
          
          # Import GCC Release Manager keys
          # GNU key for GCC 13 (e.g., Jakub Jelinek)
          gpg --keyserver hkps://keyserver.ubuntu.com --recv-keys \
            D3A93CAD751C2AF4F8C7AD516C35B999583A0917 \
            B9D0A164669A4D3B || echo "Keyserver failed, trying alternative..."
          
          # Attempt verification (allow continuation for log analysis if it fails, but we target success)
          gpg --verify gcc-13.2.0.tar.xz.sig gcc-13.2.0.tar.xz || \
            (echo "GPG verification failed, computing local hash for debug: $(sha256sum gcc-13.2.0.tar.xz)" && exit 1)
          
          cd ..
          tar -xJf workspace/gcc-13.2.0.tar.xz -C workspace/src --strip-components=1

      - name: SAST Scan via Semgrep
        continue-on-error: true
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: "p/c"
          input: workspace/src/

      - name: Compile C++ Runtimes (Fedora Glibc-Native Sandbox)
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
        with:
          image: ghcr.io/${{ github.repository_owner }}/base-fedora:latest
          options: -v ${{ github.workspace }}/workspace:/workspace
          run: |
            dnf install -y gcc gcc-c++ make binutils wget bzip2 gmp-devel mpc-devel mpfr-devel flex bison diffutils
            mkdir -p /workspace/build
            cd /workspace/build
            export SOURCE_DATE_EPOCH=315532800
            ../src/configure --prefix=/usr \
              --enable-languages=c,c++ \
              --disable-bootstrap \
              --disable-multilib \
              --disable-nls \
              --with-system-zlib
            # Build and install the target C++ runtime only
            make all-target-libstdc++-v3 -j$(nproc)
            make install-target-libstdc++-v3 DESTDIR=/workspace/out
            
      - name: Package Payload
        run: tar -czf gcc-layer.tar.gz -C workspace/out .
        
      - name: Generate SBOM (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'fs'
          scan-ref: 'workspace/out'
          format: 'spdx-json'
          output: 'gcc-sbom.spdx.json'

      - name: Push to GHCR as OCI Scratch Artifact
        id: push
        run: |
          echo "FROM scratch" > Dockerfile
          echo "COPY gcc-layer.tar.gz /" >> Dockerfile
          docker build -t ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest" | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          
      - name: Sign OCI Artifact Keyless (Cosign)
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest
          cosign attach sbom --sbom gcc-sbom.spdx.json ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest

      - name: Generate SLSA Build Provenance (Level 3)
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/artifacts-gcc
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

