name: Opensource Distroless Assembler - perl

on:
  workflow_dispatch:
  workflow_call:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Download and Strip Verified Perl Binary
        run: |
          mkdir -p payload/raw payload/stripped
          # Fetch optimized Perl binary
          curl -L "https://github.com/mbuccarello/distroless-the-hard-way/releases/download/v1.0.0-assets/perl-5.38.2-x86_64.tar.gz" -o payload/raw/perl.tar.gz
          
          # Strip components using full GNU tar in the runner
          tar -xzf payload/raw/perl.tar.gz -C payload/stripped --strip-components=1
          # Repack clean tarball
          tar -czf payload/perl.tar.gz -C payload/stripped .
          
      - name: Install Cosign (Direct Binary)
        run: |
          curl -O -L "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64"
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign
          cosign version
          
      - name: Verify CC Ancestry
        run: |
          cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" ghcr.io/${{ github.repository_owner }}/cc:latest
          
      - name: Construct Perl Execution Environment
        run: |
          cat <<EOF > Dockerfile
          # Extract safely using the Stage 1 Static Bootstrap (Glibc-native)
          FROM ghcr.io/${{ github.repository_owner }}/bootstrap:latest as extractor
          COPY payload/perl.tar.gz /
          # Use our own trusted static tar for extraction (Stripped Payload)
          RUN ["/bin/sh", "-c", "mkdir -p /usr/local/perl && /bin/tar -xzf /perl.tar.gz -C /usr/local/perl"]
          
          # Overlay onto strictly verified Opensource Distroless CC
          FROM ghcr.io/${{ github.repository_owner }}/cc:latest
          COPY --from=extractor /usr/local/perl /usr/local/perl
          
          ENV PATH=/usr/local/perl/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          
          ENTRYPOINT ["/usr/local/perl/bin/perl"]
          EOF
          
          docker build -t ghcr.io/${{ github.repository_owner }}/perl:latest .

      - name: Functional Smoke Test (Verification)
        run: |
          docker run --rm ghcr.io/${{ github.repository_owner }}/perl:latest --version

      - name: Run Final Image SCA Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/perl:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Publish, Sign, and Attest Opensource Distroless Product
        uses: ./.github/actions/assemble-publish-sign
        with:
          image-name: 'perl'
          tags: 'latest'
          github-token: ${{ secrets.GITHUB_TOKEN }}

