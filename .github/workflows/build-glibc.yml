name: Opensource Distroless Build - glibc

on:
  push:
    paths:
      - '.github/workflows/build-glibc.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write # Required for Cosign
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Cosign
        uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e
        
      - name: Fetch and Verify GNU glibc Source
        run: |
          mkdir -p workspace/src workspace/out
          curl -L https://ftp.gnu.org/gnu/glibc/glibc-2.39.tar.gz -o workspace/glibc.tar.gz
          echo "97f84f3b7588cd54093a6f6389b0c1a81e70d99708d74963a2e3eab7c7dc942d workspace/glibc.tar.gz" | sha256sum -c -
          tar -xzf workspace/glibc.tar.gz -C workspace/src --strip-components=1
          
      - name: SAST Scan via Semgrep
        continue-on-error: true
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: "p/c"
          input: workspace/src/

      - name: Compile GNU glibc (Alpine Sandbox)
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
        with:
          image: ghcr.io/${{ github.repository_owner }}/base-alpine:latest
          options: -v ${{ github.workspace }}/workspace:/workspace
          run: |
            apk add --no-cache build-base bash gawk bison python3 python3-dev make linux-headers sed diffutils grep perl texinfo
            mkdir -p /workspace/build
            cd /workspace/build
            export SOURCE_DATE_EPOCH=315532800 # 1980 timestamps for reproducibility
            PYTHON=python3 ../src/configure --prefix=/usr CFLAGS="-O2" --disable-werror
            make -j$(nproc) PYTHON=python3
            make install DESTDIR=/workspace/out PYTHON=python3
            
      - name: Package Payload
        run: tar -czf glibc-layer.tar.gz -C workspace/out .
        
      - name: Generate SBOM (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'fs'
          scan-ref: 'workspace/out'
          format: 'spdx-json'
          output: 'glibc-sbom.spdx.json'

      - name: Push to GHCR as OCI Scratch Artifact
        id: push
        run: |
          echo "FROM scratch" > Dockerfile
          echo "ADD glibc-layer.tar.gz /" >> Dockerfile
          docker build -t ghcr.io/${{ github.repository_owner }}/artifacts-glibc:latest .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/artifacts-glibc:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/${{ github.repository_owner }}/artifacts-glibc:latest" | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          
      - name: Sign OCI Artifact Keyless (Cosign)
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/artifacts-glibc:latest
          cosign attach sbom --sbom glibc-sbom.spdx.json ghcr.io/${{ github.repository_owner }}/artifacts-glibc:latest

      - name: Generate SLSA Build Provenance (Level 3)
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/artifacts-glibc
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

