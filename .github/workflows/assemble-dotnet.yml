name: Opensource Distroless Assembler - dotnet

on:
  workflow_dispatch:
  workflow_call:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Download Official Microsoft .NET SDK/Runtime
        run: |
          mkdir -p payload
          # Fetch official .NET 8.0 Runtime
          curl -L "https://download.visualstudio.microsoft.com/download/pr/907cc36c-94cc-45f8-bba9-7ce53fe2d392/c8b21efbde79fc74dcdd1378f4eedb79/dotnet-runtime-8.0.2-linux-x64.tar.gz" -o payload/dotnet.tar.gz
          # Strict verification (Microsoft Official SHA512 for 8.0.2)
          echo "f30f72f55b9e97e36107f920e932477183867726a963ea0d4d151f291981877ba253a7175614c60b386b6a37f9192d97d7402dafdad2529369f512698cb9d1dd payload/dotnet.tar.gz" | sha512sum -c -

      - name: Install Cosign (Direct Binary)
        run: |
          curl -O -L "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64"
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign
          cosign version
          
      - name: Verify CC Ancestry
        run: |
          cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" ghcr.io/${{ github.repository_owner }}/cc:latest
          
      - name: Construct .NET Execution Environment
        run: |
          cat <<EOF > Dockerfile
          # Extract safely using the Stage 1 Static Bootstrap (Glibc-native)
          FROM ghcr.io/${{ github.repository_owner }}/bootstrap:latest as extractor
          COPY payload/dotnet.tar.gz /
          # Use our own trusted static tar for extraction
          RUN ["/bin/sh", "-c", "mkdir -p /usr/share/dotnet && /bin/tar -xzf /dotnet.tar.gz -C /usr/share/dotnet"]
          
          # Overlay onto strictly verified Opensource Distroless CC
          FROM ghcr.io/${{ github.repository_owner }}/cc:latest
          COPY --from=extractor /usr/share/dotnet /usr/share/dotnet
          
          # Implement standard FHS symlink using our trusted static ln
          COPY --from=extractor /bin/ln /bin/ln
          RUN ["/bin/ln", "-s", "/usr/share/dotnet/dotnet", "/usr/bin/dotnet"]
          
          ENV DOTNET_ROOT=/usr/share/dotnet
          ENV PATH=\$DOTNET_ROOT:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          
          ENTRYPOINT ["/usr/bin/dotnet"]
          EOF
          
          docker build -t ghcr.io/${{ github.repository_owner }}/dotnet:8.0 .
          docker build -t ghcr.io/${{ github.repository_owner }}/dotnet:latest .

      - name: Functional Smoke Test (Verification)
        run: |
          docker run --rm ghcr.io/${{ github.repository_owner }}/dotnet:latest --version

      - name: Run Final Image SCA Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/dotnet:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Publish, Sign, and Attest Opensource Distroless Product
        uses: ./.github/actions/assemble-publish-sign
        with:
          image-name: 'dotnet'
          tags: '8.0 latest'
          github-token: ${{ secrets.GITHUB_TOKEN }}

