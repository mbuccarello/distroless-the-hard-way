name: "Foundation: Static (L1)"

on:
  workflow_dispatch:
  push:
    paths:
      - 'foundations/static.Dockerfile'
      - 'foundations/builder.Dockerfile'

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-static:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Foundation HCL
        run: python3 engine/engine.py --mode foundation

      - name: Build and Push Static
        uses: docker/bake-action@v5
        with:
          files: foundations/foundations.hcl
          targets: static
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
