name: Opensource Distroless E2E - dotnet

on:
  workflow_run:
    workflows: ["Opensource Distroless Assembler - dotnet"]
    types:
      - completed
  workflow_dispatch:
  workflow_call:

jobs:
  e2e-test:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Build E2E Application (SDK)
        run: |
          docker run --rm -v ${{ github.workspace }}/E2E/dotnet/HelloOpensource Distroless:/src -w /src mcr.microsoft.com/dotnet/sdk:8.0 dotnet publish -c Release -o out

      - name: Execute E2E Application (Opensource Distroless Distroless)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker run --rm -v ${{ github.workspace }}/E2E/dotnet/HelloOpensource Distroless/out:/app -w /app ghcr.io/${{ github.repository_owner }}/dotnet:latest HelloOpensource Distroless
