name: Opensource Distroless Build - openssl

on:
  push:
    paths:
      - '.github/workflows/build-openssl.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Cosign (Direct Binary)
        run: |
          curl -O -L "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64"
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign
          cosign version
          
      - name: Authenticate to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Fetch and Verify OpenSSL Source
        run: |
          mkdir -p workspace/src workspace/out
          curl -L https://github.com/openssl/openssl/releases/download/openssl-3.2.1/openssl-3.2.1.tar.gz -o workspace/openssl.tar.gz
          echo "83c7329fe52c850677d75e5d0b0ca245309b97e8ecbcfdc1dfdc4ab9fac35b39 workspace/openssl.tar.gz" | sha256sum -c -
          tar -xzf workspace/openssl.tar.gz -C workspace/src --strip-components=1
          
      - name: SAST Scan via Semgrep
        continue-on-error: true
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: "p/c"

      - name: Compile OpenSSL (Fedora Glibc-Native Sandbox)
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
        with:
          image: ghcr.io/${{ github.repository_owner }}/base-fedora:latest
          options: -v ${{ github.workspace }}/workspace:/workspace
          run: |
            dnf install -y gcc make perl-devel perl-FindBin perl-IPC-Cmd perl-File-Compare zlib-devel diffutils bzip2
            cd /workspace/src
            export SOURCE_DATE_EPOCH=315532800
            ./config no-shared --prefix=/usr -O3
            make -j$(nproc)
            make install_sw DESTDIR=/workspace/out
            
      - name: Package Payload
        run: tar -czf openssl-layer.tar.gz -C workspace/out .
        
      - name: Generate SBOM (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'fs'
          scan-ref: 'workspace/out'
          format: 'spdx-json'
          output: 'openssl-sbom.spdx.json'

      - name: Push to GHCR as OCI Scratch Artifact
        id: push
        run: |
          echo "FROM scratch" > Dockerfile
          echo "COPY openssl-layer.tar.gz /" >> Dockerfile
          docker build -t ghcr.io/${{ github.repository_owner }}/artifacts-openssl:latest .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/artifacts-openssl:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/${{ github.repository_owner }}/artifacts-openssl:latest" | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          
      - name: Sign OCI Artifact Keyless (Cosign)
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/artifacts-openssl:latest
          cosign attach sbom --sbom openssl-sbom.spdx.json ghcr.io/${{ github.repository_owner }}/artifacts-openssl:latest

      - name: Generate SLSA Build Provenance (Level 3)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/artifacts-openssl
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

