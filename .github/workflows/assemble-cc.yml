name: Opensource Distroless Assembler - cc

on:
  workflow_run:
    workflows: ["Opensource Distroless Assembler - base", "Opensource Distroless Build - gcc"]
    types:
      - completed
  workflow_dispatch:
  workflow_call:

jobs:
  assemble:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Install Cosign (Direct Binary)
        run: |
          curl -O -L "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64"
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign
          cosign version

      - name: Authenticate to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Verify Ancestry (Base + GCC)
        run: |
          # Prove mathematical origin of the parent OS and the C++ Runtime component
          cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" ghcr.io/${{ github.repository_owner }}/base:latest
          cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest
          
      - name: Construct CC Image
        id: push
        run: |
          cat <<EOF > Dockerfile
          FROM scratch as extractor
          # Use our trusted static bootstrap for extraction
          COPY --from=ghcr.io/${{ github.repository_owner }}/bootstrap:latest /tar /busybox
          COPY --from=ghcr.io/${{ github.repository_owner }}/artifacts-gcc:latest /gcc-layer.tar.gz /
          RUN ["/busybox", "mkdir", "/rootfs"]
          RUN ["/busybox", "tar", "-xzf", "/gcc-layer.tar.gz", "-C", "/rootfs"]
              
          FROM ghcr.io/${{ github.repository_owner }}/base:latest
          COPY --from=extractor /rootfs /
          EOF
          
          docker build -t ghcr.io/${{ github.repository_owner }}/cc:latest .
          docker push ghcr.io/${{ github.repository_owner }}/cc:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/${{ github.repository_owner }}/cc:latest" | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Run CC Image SCA Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/cc:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          
      - name: Generate SBOM (Trivy JSON)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/cc:latest'
          format: 'spdx-json'
          output: 'cc-sbom.spdx.json'
          
      - name: Sign Distroless CC
        run: |
          echo "Signing image ghcr.io/${{ github.repository_owner }}/cc:latest..."
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/cc:latest
          cosign attach sbom --sbom cc-sbom.spdx.json ghcr.io/${{ github.repository_owner }}/cc:latest
          # Internal verification
          cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" ghcr.io/${{ github.repository_owner }}/cc:latest

      - name: Generate SLSA Build Provenance (Level 3)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/cc
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

