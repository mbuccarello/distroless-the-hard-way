name: "Stack: Runtime Assembly"

on:
  workflow_dispatch:
    inputs:
      stack:
        description: 'Language stack to build (e.g. python)'
        required: true
        default: 'python'
      push:
        description: 'Push images to registry'
        type: boolean
        required: true
        default: true

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize Distroless Engine
        run: |
          python3 engine/engine.py --mode runtime --stack stacks/${{ github.event.inputs.stack }}.yaml
          echo "--- foundations/${{ github.event.inputs.stack }}.hcl ---"
          cat foundations/${{ github.event.inputs.stack }}.hcl
          echo "--- foundations/runtime.Dockerfile ---"
          cat foundations/runtime.Dockerfile

      - name: Build and Assemble Runtime
        uses: docker/bake-action@v5
        with:
          files: foundations/${{ github.event.inputs.stack }}.hcl
          push: ${{ github.event.inputs.push }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Extract Digest
        if: github.event.inputs.push == 'true'
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${REGISTRY}/${{ github.event.inputs.stack }}-distroless:latest | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

  e2e-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run E2E Smoke Test
        run: |
          docker pull ${REGISTRY}/${{ github.event.inputs.stack }}-distroless:latest
          case "${{ github.event.inputs.stack }}" in
            python)
              docker run --rm ${REGISTRY}/${{ github.event.inputs.stack }}-distroless:latest python --version
              ;;
            nodejs)
              docker run --rm ${REGISTRY}/${{ github.event.inputs.stack }}-distroless:latest node --version
              ;;
            java)
              docker run --rm ${REGISTRY}/${{ github.event.inputs.stack }}-distroless:latest java -version
              ;;
            dotnet)
              docker run --rm ${REGISTRY}/${{ github.event.inputs.stack }}-distroless:latest dotnet --list-runtimes
              ;;
            *)
              echo "No smoke test defined for ${{ github.event.inputs.stack }}"
              ;;
          esac
