name: "Foundation: CC (L3)"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Foundation: Base (L2)"]
    types:
      - completed
  push:
    paths:
      - 'foundations/cc.Dockerfile'

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-cc:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Foundation HCL
        run: python3 engine/engine.py --mode foundation

      - name: Build and Push CC
        uses: docker/bake-action@v4
        with:
          files: foundations/foundations.hcl
          targets: cc
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
