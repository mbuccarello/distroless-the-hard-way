name: Distroless Full Fleet Build

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday
  workflow_dispatch:

jobs:
  determine-stacks:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - id: set-matrix
        run: |
          # Robust matrix generation - exclude foundations as they are built within runtimes
          FILES=$(ls stacks/*.yaml)
          STACKS_JSON=$(for f in $FILES; do 
            NAME=$(basename "$f" .yaml)
            if [[ ! "$NAME" =~ ^(static|base|cc)$ ]]; then
              echo "$NAME"
            fi
          done | jq -R . | jq -s -c .)
          echo "matrix=$STACKS_JSON" >> $GITHUB_OUTPUT
          echo "Generated matrix: $STACKS_JSON"

  build-fleet:
    needs: determine-stacks
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.determine-stacks.outputs.matrix) }}
    uses: ./.github/workflows/distroless-bake-master.yml
    with:
      stack: ${{ matrix.stack }}
      push: true
    secrets: inherit
