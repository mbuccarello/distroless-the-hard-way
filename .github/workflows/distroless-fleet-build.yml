name: Distroless Full Fleet Build

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday
  workflow_dispatch:

jobs:
  determine-stacks:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # Robust matrix generation
          FILES=$(ls stacks/*.yaml)
          STACKS_JSON=$(for f in $FILES; do basename "$f" .yaml; done | jq -R . | jq -s -c .)
          echo "matrix=$STACKS_JSON" >> $GITHUB_OUTPUT
          echo "Generated matrix: $STACKS_JSON"

  build-fleet:
    strategy:
      fail-fast: false
      matrix:
        stack: [python, nodejs, java, dotnet, php, perl, static, base, cc]
    uses: mbuccarello/distroless-the-hard-way/.github/workflows/distroless-bake-master.yml@main
    with:
      stack: ${{ matrix.stack }}
      push: true
    secrets: inherit
