name: Distroless The Hard Way - Bootstrap Builder

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Authenticate to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Static Busybox (Alpine Sandbox)
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/${{ github.repository_owner }}/base-alpine:latest
          options: -v ${{ github.workspace }}:/workspace
          run: |
            apk add --no-cache build-base wget bzip2
            mkdir -p /workspace/build /workspace/rootfs
            cd /workspace/build
            wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
            tar -xjf busybox-1.36.1.tar.bz2
            cd busybox-1.36.1
            
            # Configure and build (Intentionality-First Strategy)
            make allnoconfig
            
            # Enable only the absolute minimum required capabilities
            sed -i 's/^# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
            sed -i 's/^# CONFIG_TAR is not set/CONFIG_TAR=y/' .config
            sed -i 's/^# CONFIG_GZIP is not set/CONFIG_GZIP=y/' .config
            sed -i 's/^# CONFIG_FEATURE_TAR_AUTODETECT is not set/CONFIG_FEATURE_TAR_AUTODETECT=y/' .config
            sed -i 's/^# CONFIG_FEATURE_SEAMLESS_GZ is not set/CONFIG_FEATURE_SEAMLESS_GZ=y/' .config
            
            # Resolve any missing dependencies non-interactively
            yes "" | make oldconfig
            make -j$(nproc)
            
            # Verify and stage
            ldd busybox || echo "Static binary confirmed"
            cp busybox /workspace/rootfs/tar
            cp busybox /workspace/rootfs/gzip

      - name: Construct Zero-Trust Bootstrap Image
        run: |
          cat <<EOF > Dockerfile.bootstrap
          FROM scratch
          COPY rootfs/tar /tar
          COPY rootfs/gzip /gzip
          EOF
          docker build -t ghcr.io/${{ github.repository_owner }}/bootstrap:latest -f Dockerfile.bootstrap .


      - name: Build and Push Bootstrap OS
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/bootstrap:latest

      - name: Sign Bootstrap Distroless Core
        uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e
        
      - name: Sign Object
        run: cosign sign --yes ghcr.io/${{ github.repository_owner }}/bootstrap:latest
