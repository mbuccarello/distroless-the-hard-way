name: Opensource Distroless Build - tzdata

on:
  push:
    paths:
      - '.github/workflows/build-tzdata.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Cosign
        uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e
        
      - name: Fetch and Verify IANA Source
        run: |
          mkdir -p workspace/src workspace/out
          curl -L https://data.iana.org/time-zones/releases/tzdata2024a.tar.gz -o workspace/tzdata.tar.gz
          echo "3b4694469e3568d7122b0f4967397e59c1b72e51921389e09d17d5c589b27670 workspace/tzdata.tar.gz" | sha256sum -c -
          tar -xzf workspace/tzdata.tar.gz -C workspace/src
          
      - name: Compile Timezones (Alpine Sandbox)
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
        with:
          image: ghcr.io/${{ github.repository_owner }}/base-alpine:latest
          options: -v ${{ github.workspace }}/workspace:/workspace
          run: |
            apk add --no-cache build-base make
            cd /workspace/src
            export SOURCE_DATE_EPOCH=315532800
            make DESTDIR=/workspace/out TZDIR=/usr/share/zoneinfo install
            
      - name: Package Payload
        run: tar -czf tzdata-layer.tar.gz -C workspace/out .
        
      - name: Generate SBOM (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'fs'
          scan-ref: 'workspace/out'
          format: 'spdx-json'
          output: 'tzdata-sbom.spdx.json'

      - name: Push to GHCR as OCI Scratch Artifact
        id: push
        run: |
          echo "FROM scratch" > Dockerfile
          echo "ADD tzdata-layer.tar.gz /" >> Dockerfile
          docker build -t ghcr.io/${{ github.repository_owner }}/artifacts-tzdata:latest .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/artifacts-tzdata:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/${{ github.repository_owner }}/artifacts-tzdata:latest" | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          
      - name: Sign OCI Artifact Keyless (Cosign)
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/artifacts-tzdata:latest
          cosign attach sbom --sbom tzdata-sbom.spdx.json ghcr.io/${{ github.repository_owner }}/artifacts-tzdata:latest

      - name: Generate SLSA Build Provenance (Level 3)
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/artifacts-tzdata
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

