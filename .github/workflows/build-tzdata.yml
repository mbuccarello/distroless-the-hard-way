name: Opensource Distroless Build - tzdata

on:
  push:
    paths:
      - '.github/workflows/build-tzdata.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1
          
      - name: Authenticate to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Fetch and Verify IANA Source (Code + Data)
        run: |
          mkdir -p workspace/src workspace/out
          # IANA 2024b requires both code (Makefile/scripts) and data
          curl -L https://data.iana.org/time-zones/releases/tzcode2024b.tar.gz -o workspace/tzcode.tar.gz
          curl -L https://data.iana.org/time-zones/releases/tzdata2024b.tar.gz -o workspace/tzdata.tar.gz
          
          echo "5e438fc449624906af16a18ff4573739f0cda9862e5ec28d3bcb19cbaed0f672 workspace/tzcode.tar.gz" | sha256sum -c -
          echo "70e754db126a8d0db3d16d6b4cb5f7ec1e04d5f261255e4558a67fe92d39e550 workspace/tzdata.tar.gz" | sha256sum -c -
          
          tar -xzf workspace/tzcode.tar.gz -C workspace/src
          tar -xzf workspace/tzdata.tar.gz -C workspace/src
          
      - name: Compile Timezones (Fedora Glibc-Native Sandbox)
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
        with:
          image: ghcr.io/${{ github.repository_owner }}/base-fedora:latest
          options: -v ${{ github.workspace }}/workspace:/workspace
          run: |
            dnf install -y gcc make
            cd /workspace/src
            export SOURCE_DATE_EPOCH=315532800
            make DESTDIR=/workspace/out TZDIR=/usr/share/zoneinfo install
            
      - name: Package Payload
        run: tar -czf tzdata-layer.tar.gz -C workspace/out .
        
      - name: Generate SBOM (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'fs'
          scan-ref: 'workspace/out'
          format: 'spdx-json'
          output: 'tzdata-sbom.spdx.json'

      - name: Push to GHCR as OCI Scratch Artifact
        id: push
        run: |
          echo "FROM scratch" > Dockerfile
          echo "COPY tzdata-layer.tar.gz /" >> Dockerfile
          docker build -t ghcr.io/${{ github.repository_owner }}/artifacts-tzdata:latest .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/artifacts-tzdata:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/${{ github.repository_owner }}/artifacts-tzdata:latest" | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          
      - name: Sign OCI Artifact Keyless (Cosign)
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/artifacts-tzdata:latest
          cosign attach sbom --sbom tzdata-sbom.spdx.json ghcr.io/${{ github.repository_owner }}/artifacts-tzdata:latest

      - name: Generate SLSA Build Provenance (Level 3)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/artifacts-tzdata
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

