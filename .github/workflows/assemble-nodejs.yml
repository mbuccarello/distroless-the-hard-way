name: Opensource Distroless Assembler - nodejs

on:
  workflow_dispatch:
  workflow_call:

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Download and Strip Official Node.js Binary
        run: |
          mkdir -p payload/raw payload/stripped
          # Fetch official Node.js 20 LTS
          curl -L "https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-x64.tar.gz" -o payload/raw/node.tar.gz
          # Dynamic verification using official Node.js manifest
          curl -L "https://nodejs.org/dist/v20.11.1/SHASUMS256.txt" -o payload/raw/node.tar.gz.sha256
          grep "node-v20.11.1-linux-x64.tar.gz" payload/raw/node.tar.gz.sha256 | sed 's/node-v20.11.1-linux-x64.tar.gz/payload\/raw\/node.tar.gz/' | sha256sum -c -
          
          # Strip components using full GNU tar in the runner
          tar -xzf payload/raw/node.tar.gz -C payload/stripped --strip-components=1
          # Repack clean tarball
          tar -czf payload/node.tar.gz -C payload/stripped .
          
      - name: Install Cosign (Direct Binary)
        run: |
          curl -O -L "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64"
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign
          cosign version
          
      - name: Verify CC Ancestry
        run: |
          cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" ghcr.io/${{ github.repository_owner }}/cc:latest
          
      - name: Construct Node.js Execution Environment
        run: |
          cat <<EOF > Dockerfile
          # Extract safely using the Stage 1 Static Bootstrap (Glibc-native)
          FROM ghcr.io/${{ github.repository_owner }}/bootstrap:latest as extractor
          COPY payload/node.tar.gz /
          # Use our own trusted static tar for extraction (Stripped Payload)
          RUN ["/bin/sh", "-c", "mkdir -p /usr/local/lib/nodejs && /bin/tar -xzf /node.tar.gz -C /usr/local/lib/nodejs"]
          
          # Overlay onto strictly verified Opensource Distroless CC
          FROM ghcr.io/${{ github.repository_owner }}/cc:latest
          COPY --from=extractor /usr/local/lib/nodejs /usr/local/lib/nodejs
          
          # Implement standard FHS symlink using our trusted static ln
          COPY --from=extractor /bin/ln /bin/ln
          RUN ["/bin/ln", "-s", "/usr/local/lib/nodejs/bin/node", "/usr/bin/node"]
          RUN ["/bin/ln", "-s", "/usr/local/lib/nodejs/bin/npm", "/usr/bin/npm"]
          
          ENV NODE_HOME=/usr/local/lib/nodejs
          ENV PATH=\$NODE_HOME/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          
          ENTRYPOINT ["/usr/bin/node"]
          EOF
          
          docker build -t ghcr.io/${{ github.repository_owner }}/nodejs:20 .
          docker build -t ghcr.io/${{ github.repository_owner }}/nodejs:latest .

      - name: Functional Smoke Test (Verification)
        run: |
          docker run --rm ghcr.io/${{ github.repository_owner }}/nodejs:latest --version

      - name: Run Final Image SCA Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/nodejs:latest'
          format: 'table'
          exit-code: '1' # Fail heavily if high/crit CVEs are found in the final composition
          severity: 'CRITICAL,HIGH'

      - name: Publish, Sign, and Attest Opensource Distroless Product
        uses: ./.github/actions/assemble-publish-sign
        with:
          image-name: 'nodejs'
          tags: '20 latest'
          github-token: ${{ secrets.GITHUB_TOKEN }}

