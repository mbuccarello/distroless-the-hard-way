name: "Distroless: Master Bake Workflow"

on:
  workflow_call:
    inputs:
      stack:
        description: 'Language stack to build (e.g. python)'
        required: true
        type: string
      push:
        description: 'Push images to registry'
        type: boolean
        required: false
        default: true
    outputs:
      image:
        description: "The full image name"
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: "The image digest"
        value: ${{ jobs.build.outputs.digest }}

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image: ${{ env.REGISTRY }}/${{ inputs.stack }}-distroless
      digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prune Docker Cache (Pre-build)
        run: docker builder prune -f

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize Build Engine
        run: |
          python3 engine/engine.py --mode runtime --stack stacks/${{ inputs.stack }}.yaml
          echo "STACK_NAME=${{ inputs.stack }}" >> $GITHUB_ENV

      - name: Check Buildx Version
        run: docker buildx version

      - name: Build and Assemble Runtime
        id: build
        run: |
          docker buildx bake \
            -f foundations/${{ inputs.stack }}.hcl \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            --metadata-file metadata.json \
            --push \
            runtime
          
          DIGEST=$(jq -r '.runtime["containerimage.digest"]' metadata.json)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "IMAGE_DIGEST=$DIGEST" >> $GITHUB_ENV

      - name: Generate SBOM (Syft)
        if: inputs.push
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ inputs.stack }}-distroless:latest
          artifact-name: sbom-${{ inputs.stack }}.json
          output-format: cyclonedx-json

      - name: Scan Image (Grype)
        if: inputs.push
        uses: anchore/scan-action@v3
        with:
          image: ${{ env.REGISTRY }}/${{ inputs.stack }}-distroless:latest
          fail-build: false
          severity-cutoff: critical

      - name: Install Cosign
        if: inputs.push
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign Image (Keyless)
        if: inputs.push
        run: |
          cosign sign --yes ${REGISTRY}/${{ inputs.stack }}-distroless@${{ steps.digest.outputs.digest }}

      - name: Generate SLSA Provenance
        if: inputs.push
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ inputs.stack }}-distroless
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
