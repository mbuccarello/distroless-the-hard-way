name: Distroless Bake Master

on:
  workflow_dispatch:
    inputs:
      stack:
        description: 'Language stack to build (e.g., python, nodejs, java, dotnet)'
        required: true
        default: 'python'
      push:
        description: 'Push images to registry'
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      stack:
        description: 'Language stack to build'
        required: true
        type: string
      push:
        description: 'Push images to registry'
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Initialize Distroless Engine
        env:
          RENDER_DIAGRAMS: true
        run: |
          python3 distroless_engine.py --stack stacks/${{ inputs.stack }}.yaml --graph

      - name: Build and Push with Bake
        run: |
          docker buildx bake \
            -f docker-bake.hcl \
            --set "*.args.REGISTRY=ghcr.io/${{ github.repository_owner }}" \
            --metadata-file metadata.json \
            ${{ inputs.push == true && '--push' || '--load' }}

      - name: Extract Digest
        id: digest
        if: ${{ inputs.push }}
        run: |
          DIGEST=$(jq -r '.runtime["containerimage.digest"]' metadata.json)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Execute E2E Smoke Test
        run: |
          # Use --load if not pushing, or pull if pushed
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${{ inputs.stack }}-distroless:latest"
          
          # If we didn't push, we need to load it into the local daemon for testing
          if [ "${{ inputs.push }}" = "false" ]; then
            docker buildx bake -f docker-bake.hcl --set "*.output=type=docker" runtime
          else
            docker pull "$IMAGE_NAME"
          fi

          case "${{ inputs.stack }}" in
            python) TEST_CMD="python3 /app/test.py" ;;
            nodejs) TEST_CMD="node /app/test.js" ;;
            java) TEST_CMD="java /app/test.java" ;;
            php) TEST_CMD="php /app/test.php" ;;
            perl) TEST_CMD="perl /app/test.pl" ;;
            dotnet) TEST_CMD="dotnet --info" ;;
            *) TEST_CMD="true" ;;
          esac
          
          echo "🚀 Running E2E Test for ${{ inputs.stack }}..."
          docker run --rm -v $(pwd)/app:/app "$IMAGE_NAME" $TEST_CMD

      - name: Sign Images
        if: ${{ inputs.push }}
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${{ inputs.stack }}-distroless"
          cosign sign --yes "${IMAGE_NAME}@${{ steps.digest.outputs.digest }}"

      - name: Generate SLSA Build Provenance (Level 3)
        if: ${{ inputs.push }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ inputs.stack }}-distroless
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Upload Architecture DAG and Diagrams
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.stack }}-artifacts
          path: |
            docs/mermaid/${{ inputs.stack }}-distroless.mermaid
            docs/images/${{ inputs.stack }}-distroless.png
