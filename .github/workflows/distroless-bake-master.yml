name: Distroless Bake Master

on:
  workflow_dispatch:
    inputs:
      stack:
        description: 'Language stack to build (e.g., python, nodejs, java, dotnet)'
        required: true
        default: 'python'
      push:
        description: 'Push images to registry'
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      stack:
        description: 'Language stack to build'
        required: true
        type: string
      push:
        description: 'Push images to registry'
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Initialize Distroless Engine
        run: |
          echo "Workspace: ${{ github.workspace }}"
          echo "PWD: $(pwd)"
          ls -la
          python3 distroless_engine.py --stack stacks/${{ inputs.stack }}.yaml --graph
          echo "Exit Code: $?"
          ls -la docker-bake.hcl

      - name: Build and Push with Bake
        id: bake
        uses: docker/bake-action@v6
        with:
          files: ./docker-bake.hcl
          push: ${{ inputs.push }}
          set: |
            *.platforms=linux/amd64
            *.args.REGISTRY=ghcr.io/${{ github.repository_owner }}

      - name: Sign Images
        if: ${{ inputs.push }}
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${{ inputs.stack }}-distroless"
          cosign sign --yes "${IMAGE_NAME}:latest"
          cosign sign --yes "${IMAGE_NAME}:debug"

      - name: Generate SLSA Build Provenance (Level 3)
        if: ${{ inputs.push }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ inputs.stack }}-distroless
          push-to-registry: true

      - name: Upload Architecture DAG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.stack }}-dag
          path: docs/mermaid/${{ inputs.stack }}-distroless.mermaid
