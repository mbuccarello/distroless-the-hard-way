name: Opensource Distroless E2E - nodejs

on:
  workflow_run:
    workflows: ["Opensource Distroless Assembler - nodejs"]
    types:
      - completed
  workflow_dispatch:
  workflow_call:

jobs:
  e2e-test:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Execute E2E Application (Opensource Distroless Distroless Node.js)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker run --rm -v ${{ github.workspace }}/E2E/nodejs:/app -w /app ghcr.io/${{ github.repository_owner }}/nodejs:latest index.js
