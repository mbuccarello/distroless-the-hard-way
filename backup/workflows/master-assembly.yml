name: "Layer 2: Assembly (Image Construction)"

# Technical Specification: Assembly Layer
# This workflow orchestrates the construction of static, base, and cc images.
# Diagram: docs/images/lib-hierarchy.png

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/master-assembly.yml"
      - ".github/workflows/assemble-*.yml"
      - "docs/lib-hierarchy.md"
  workflow_run:
    workflows: ["Layer 1.5: Runtime Foundations (Shared Libs)"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  static:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/assemble-static.yml
    secrets: inherit

  base:
    needs: [static]
    uses: ./.github/workflows/assemble-base.yml
    secrets: inherit

  cc:
    needs: [base]
    uses: ./.github/workflows/assemble-cc.yml
    secrets: inherit

  java:
    needs: [cc]
    uses: ./.github/workflows/assemble-java.yml
    secrets: inherit

  python3:
    needs: [cc]
    uses: ./.github/workflows/assemble-python3.yml
    secrets: inherit

  nodejs:
    needs: [cc]
    uses: ./.github/workflows/assemble-nodejs.yml
    secrets: inherit

  php:
    needs: [base]
    uses: ./.github/workflows/assemble-php.yml
    secrets: inherit

  perl:
    needs: [base]
    uses: ./.github/workflows/assemble-perl.yml
    secrets: inherit

  go:
    needs: [static]
    uses: ./.github/workflows/assemble-go.yml
    secrets: inherit

  go-cgo:
    needs: [base]
    uses: ./.github/workflows/assemble-go-cgo.yml
    secrets: inherit

  dotnet:
    needs: [cc]
    uses: ./.github/workflows/assemble-dotnet.yml
    secrets: inherit
